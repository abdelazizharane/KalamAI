version: "3.8"

services:
  # --- Redis ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (FastAPI) ----------------------------------------------------
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_PIPELINE_URL=http://ai-pipeline:8001
      - SECRET_KEY=${SECRET_KEY:-kalamai-dev-secret-CHANGE-IN-PRODUCTION}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,https://localhost:3443
      - APP_URL=${APP_URL:-http://localhost:3000}
      # ── Email (choose ONE option) ─────────────────────────────────────────
      # Option A — Resend (easiest, free 3 000 emails/month): https://resend.com
      #   1. Create free account → Dashboard → API Keys → Create API Key
      #   2. Set RESEND_API_KEY=re_xxxxxxxxxxxx in .env
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # Option B — Gmail SMTP: generate App Password at myaccount.google.com/apppasswords
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@kalamai.ai}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- AI Pipeline (STT -> Translation -> TTS) ------------------------------
  ai-pipeline:
    build: ./ai-pipeline
    restart: unless-stopped
    ports:
      - "8001:8001"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./models:/models
      - hf_cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://redis:6379
      - MODELS_DIR=/models
      - DEVICE=${AI_DEVICE:-cpu}
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 16g
        reservations:
          memory: 8g

  # --- Frontend (React + Vite + nginx) --------------------------------------
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"   # HTTP  — use on localhost
      - "3443:3443"   # HTTPS — use from LAN devices (accept self-signed cert warning)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
  hf_cache:
