server_name: "kalamai.local"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

log_config: "/config/kalamai.log.config"
media_store_path: /data/media_store
registration_shared_secret: "CHANGE_THIS_SECRET"
report_stats: false
macaroon_secret_key: "CHANGE_THIS_MACAROON_KEY"
form_secret: "CHANGE_THIS_FORM_SECRET"
signing_key_path: "/data/kalamai.local.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"

enable_registration: true
enable_registration_without_verification: true
